<!DOCTYPE html>
<html>
<head>
    <title>{{ event.title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page">
        <div class="detail-card">
            <a class="back-link" href="{{ url_for('index') }}">&larr; Back to events</a>
            <h1>{{ event.title }}</h1>
            <p class="event-meta">{{ event.date }} &middot; {{ event.venue }}</p>
            <p class="event-desc">{{ event.description }}</p>
            <a class="btn btn-primary" href="{{ url_for('register', event_id=event.id) }}">Register for this event</a>
        </div>
    </div>
</body>
</html>
